<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playbook de Vendas Consultivas</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="./styles/main.v10.5.css">
  <link rel="stylesheet" href="./styles/patch-v10.5.2.css">
</head>
<body>
  <div id="access-gate" class="access-gate">
    <div class="access-card">
      <div class="access-kicker">Acesso restrito</div>
      <h1>Playbook de Vendas</h1>
      <p>Digite sua chave de acesso para carregar seus dados da nuvem.</p>
      <form id="access-form">
        <input id="access-token-input" type="password" autocomplete="current-password" placeholder="Chave de acesso" />
        <button id="access-submit" type="submit">Entrar</button>
      </form>
      <div id="access-error" class="access-error"></div>
    </div>
  </div>

  <button id="sb-toggle" class="sb-toggle" aria-label="Abrir menu"><i class="ti ti-menu-2"></i></button>
  <aside class="sb" id="sidebar">
    <div class="brand"><div class="brand-mark"></div><div><div class="brand-title">Playbook</div><div class="brand-sub">Vendas Consultivas</div></div></div>
    <button class="sb-main active" id="btn-db"><i class="ti ti-layout-dashboard"></i> Cockpit</button>
    <nav id="nav"></nav>
    <button class="sb-main" id="btn-cfg"><i class="ti ti-settings"></i> Configurações</button>
  </aside>
  <main class="main">
    <div id="call-banner-container"></div>
    <section id="content" class="cnt"></section>
  </main>
  <div id="modal-root"></div>

  <!-- Mantém a lógica principal da V10.5 já publicada -->
  <script src="./scripts/playbook-content.js"></script>
  <script src="./scripts/app-v10.5.js"></script>

  <!-- Patch completo V10.5.2: deleteCall + gráficos + badge -->
  <script src="./scripts/patch-v10.5.2.js"></script>
</body>
</html>
