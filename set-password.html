<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Definir senha — Playbook de Vendas</title>

  ./styles/main.v11.css
</head>

<body class="app-locked">

  <div class="access-screen">
    <div class="access-card">

      <div class="access-logo">$</div>

      <h1>Definir senha</h1>

      <p id="invite-status">
        Validando convite...
      </p>

      <div
        id="invite-loading"
        class="v13-loading"
      >
        <span class="v13-spinner"></span>
        <span>Validando convite...</span>
      </div>

      <form
        id="password-form"
        class="md-form hidden"
        novalidate
      >

        <div class="access-field">
          <label for="new-password">
            Nova senha
          </label>

          <input
            id="new-password"
            name="new-password"
            type="password"
            minlength="10"
            maxlength="128"
            autocomplete="new-password"
            required
          >
        </div>

        <div class="access-field">
          <label for="confirm-password">
            Confirmar senha
          </label>

          <input
            id="confirm-password"
            name="confirm-password"
            type="password"
            minlength="10"
            maxlength="128"
            autocomplete="new-password"
            required
          >
        </div>

        <button
          id="create-password-button"
          class="access-btn"
          type="submit"
        >
          Criar senha
        </button>

        <div
          id="password-error"
          class="access-error hidden"
          role="alert"
          aria-live="assertive"
        ></div>

      </form>

      <div
        id="password-success"
        class="hidden"
        style="
          margin-top: 16px;
          padding: 12px;
          border: 1px solid #166534;
          border-radius: 8px;
          background: #052e16;
          color: #dcfce7;
          font-size: 13px;
          line-height: 1.5;
        "
        role="status"
        aria-live="polite"
      ></div>

    </div>
  </div>

  <script>
    'use strict';

    const API_URL =
      'https://script.google.com/macros/s/AKfycbx1qJyA5y_23PzyQB92p_3PwutD9qozQedu6Dh0sbItvnA2_0yrRWoGmtfIrBwZEN6mkQ/exec';

    const inviteToken =
      new URLSearchParams(window.location.search).get('token') || '';

    const statusElement =
      document.getElementById('invite-status');

    const loadingElement =
      document.getElementById('invite-loading');

    const formElement =
      document.getElementById('password-form');

    const passwordInput =
      document.getElementById('new-password');

    const confirmPasswordInput =
      document.getElementById('confirm-password');

    const submitButton =
      document.getElementById('create-password-button');

    const errorElement =
      document.getElementById('password-error');

    const successElement =
      document.getElementById('password-success');


    function showError(message) {
      errorElement.textContent =
        message || 'Não foi possível concluir a operação.';

      errorElement.classList.remove('hidden');
    }


    function clearError() {
      errorElement.textContent = '';
      errorElement.classList.add('hidden');
    }


    function setLoading(loading, text) {
      loadingElement.classList.toggle(
        'hidden',
        !loading
      );

      if (text) {
        loadingElement.querySelector('span:last-child').textContent =
          text;
      }
    }


    function setSubmitting(submitting) {
      submitButton.disabled = submitting;

      submitButton.innerHTML = submitting
        ? '<span class="v13-spinner"></span> Criando senha...'
        : 'Criar senha';
    }


    function errorMessage(errorCode, fallbackMessage) {
      const messages = {
        invalid_invite:
          'Este convite é inválido, foi substituído ou já foi utilizado.',

        invite_expired:
          'Este convite expirou. Solicite um novo convite ao administrador.',

        user_not_found:
          'O usuário associado ao convite não foi encontrado.',

        invalid_json:
          'O servidor recebeu uma solicitação inválida.',

        server_error:
          'O servidor não conseguiu processar a solicitação.'
      };

      return fallbackMessage ||
        messages[errorCode] ||
        'Não foi possível processar este convite.';
    }


    async function callApi(action, payload) {
      let response;

      try {
        response = await fetch(API_URL, {
          method: 'POST',

          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },

          body: JSON.stringify({
            action: action,
            ...payload
          })
        });
      } catch (networkError) {
        throw new Error(
          'Não foi possível conectar ao servidor. ' +
          'Verifique sua conexão e tente novamente.'
        );
      }

      let data;

      try {
        data = await response.json();
      } catch (parseError) {
        throw new Error(
          'O servidor retornou uma resposta inválida.'
        );
      }

      return data;
    }


    async function validateInvite() {
      clearError();
      formElement.classList.add('hidden');

      if (!inviteToken) {
        setLoading(false);

        statusElement.textContent =
          'O link de convite está incompleto.';

        showError(
          'Solicite um novo convite ao administrador.'
        );

        return;
      }

      statusElement.textContent =
        'Validando convite...';

      setLoading(
        true,
        'Validando convite...'
      );

      try {
        const data = await callApi(
          'validateInvite',
          {
            token: inviteToken
          }
        );

        if (!data || data.ok !== true) {
          const message = errorMessage(
            data && data.error,
            data && data.message
          );

          statusElement.textContent = message;
          showError(message);
          return;
        }

        statusElement.textContent =
          'Olá, ' + data.name +
          '. Crie uma senha com pelo menos 10 caracteres, ' +
          'contendo letras e números.';

        formElement.classList.remove('hidden');

        window.setTimeout(function () {
          passwordInput.focus();
        }, 50);

      } catch (error) {
        statusElement.textContent =
          'Não foi possível validar o convite.';

        showError(error.message);

      } finally {
        setLoading(false);
      }
    }


    formElement.addEventListener(
      'submit',
      async function (event) {
        event.preventDefault();
        clearError();

        const password =
          passwordInput.value;

        const confirmedPassword =
          confirmPasswordInput.value;

        if (!password || !confirmedPassword) {
          showError(
            'Preencha os dois campos de senha.'
          );

          return;
        }

        if (password !== confirmedPassword) {
          showError(
            'As senhas não coincidem.'
          );

          confirmPasswordInput.focus();
          confirmPasswordInput.select();

          return;
        }

        if (password.length < 10) {
          showError(
            'A senha deve ter pelo menos 10 caracteres.'
          );

          passwordInput.focus();
          return;
        }

        if (!/[A-Za-z]/.test(password)) {
          showError(
            'A senha deve conter pelo menos uma letra.'
          );

          passwordInput.focus();
          return;
        }

        if (!/[0-9]/.test(password)) {
          showError(
            'A senha deve conter pelo menos um número.'
          );

          passwordInput.focus();
          return;
        }

        setSubmitting(true);

        try {
          const data = await callApi(
            'setPassword',
            {
              token: inviteToken,
              password: password
            }
          );

          if (!data || data.ok !== true) {
            const message = errorMessage(
              data && data.error,
              data && data.message
            );

            showError(message);

            if (
              data &&
              (
                data.error === 'invite_expired' ||
                data.error === 'invalid_invite'
              )
            ) {
              statusElement.textContent = message;
              formElement.classList.add('hidden');
            }

            return;
          }

          formElement.classList.add('hidden');

          statusElement.textContent =
            'Senha criada com sucesso.';

          successElement.textContent =
            'Sua senha foi definida. ' +
            'Você será redirecionado para o login.';

          successElement.classList.remove('hidden');

          window.setTimeout(function () {
            window.location.href = './index.html';
          }, 1500);

        } catch (error) {
          showError(error.message);

        } finally {
          setSubmitting(false);
        }
      }
    );


    validateInvite();
  </script>

</body>
</html>
