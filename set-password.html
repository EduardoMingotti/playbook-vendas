<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>Definir senha - Playbook de Vendas</title>

  <style>
    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: #f8fafc;
      background:
        radial-gradient(circle at 50% 0%, rgba(30, 64, 175, 0.22), transparent 42%),
        #020617;
    }

    .hidden {
      display: none !important;
    }

    .access-screen {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .access-card {
      width: 100%;
      max-width: 440px;
      padding: 30px;
      border: 1px solid #334155;
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.97);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.55);
      text-align: center;
    }

    .access-logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      display: grid;
      place-items: center;
      border-radius: 17px;
      background: #10b981;
      color: #ffffff;
      font-size: 42px;
      font-weight: 900;
      line-height: 1;
      box-shadow: 0 12px 34px rgba(16, 185, 129, 0.22);
    }

    .access-kicker {
      margin-bottom: 8px;
      color: #60a5fa;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 10px;
      color: #f8fafc;
      font-size: 27px;
      line-height: 1.2;
    }

    #invite-status {
      margin: 0 0 18px;
      color: #94a3b8;
      font-size: 14px;
      line-height: 1.55;
    }

    .form {
      display: flex;
      flex-direction: column;
      gap: 14px;
      text-align: left;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      color: #cbd5e1;
      font-size: 12px;
      font-weight: 700;
    }

    .field input {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #334155;
      border-radius: 10px;
      outline: none;
      background: #020617;
      color: #f8fafc;
      font-size: 14px;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .field input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.18);
    }

    .access-button {
      width: 100%;
      min-height: 46px;
      margin-top: 2px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      border: 0;
      border-radius: 10px;
      background: #2563eb;
      color: #ffffff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 800;
      transition: background 0.15s ease, opacity 0.15s ease;
    }

    .access-button:hover:not(:disabled) {
      background: #1d4ed8;
    }

    .access-button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    .message {
      margin-top: 14px;
      padding: 11px 12px;
      border-radius: 10px;
      font-size: 12px;
      line-height: 1.5;
      text-align: left;
    }

    .message-error {
      border: 1px solid #991b1b;
      background: #2d0a0a;
      color: #fecaca;
    }

    .message-success {
      border: 1px solid #166534;
      background: #052e16;
      color: #dcfce7;
    }

    .access-note {
      margin-top: 16px;
      color: #64748b;
      font-size: 11px;
      line-height: 1.55;
    }

    .loading {
      margin: 8px 0 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      color: #93c5fd;
      font-size: 12px;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      border: 3px solid #334155;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 520px) {
      .access-screen { padding: 14px; }
      .access-card { padding: 24px 20px; border-radius: 14px; }
      h1 { font-size: 24px; }
    }
  </style>
</head>

<body>
  <main class="access-screen">
    <section class="access-card" aria-labelledby="page-title">
      <div class="access-logo" aria-hidden="true">$</div>
      <div class="access-kicker">Primeiro acesso</div>
      <h1 id="page-title">Definir senha</h1>

      <p id="invite-status">Validando convite...</p>

      <div id="invite-loading" class="loading" role="status" aria-live="polite">
        <span class="spinner" aria-hidden="true"></span>
        <span>Validando convite...</span>
      </div>

      <form id="password-form" class="form hidden" novalidate>
        <div class="field">
          <label for="new-password">Nova senha</label>
          <input
            id="new-password"
            name="new-password"
            type="password"
            minlength="10"
            maxlength="128"
            autocomplete="new-password"
            placeholder="Mínimo de 10 caracteres"
            required
          >
        </div>

        <div class="field">
          <label for="confirm-password">Confirmar senha</label>
          <input
            id="confirm-password"
            name="confirm-password"
            type="password"
            minlength="10"
            maxlength="128"
            autocomplete="new-password"
            placeholder="Digite novamente"
            required
          >
        </div>

        <button id="create-password-button" class="access-button" type="submit">
          Criar senha
        </button>
      </form>

      <div id="password-error" class="message message-error hidden" role="alert" aria-live="assertive"></div>
      <div id="password-success" class="message message-success hidden" role="status" aria-live="polite"></div>

      <div class="access-note">
        A senha deve ter pelo menos 10 caracteres, incluindo letras e números.
      </div>
    </section>
  </main>

  <script>
    'use strict';

    const API_URL = 'https://script.google.com/macros/s/AKfycbx1qJyA5y_23PzyQB92p_3PwutD9qozQedu6Dh0sbItvnA2_0yrRWoGmtfIrBwZEN6mkQ/exec';
    const inviteToken = new URLSearchParams(window.location.search).get('token') || '';

    const statusElement = document.getElementById('invite-status');
    const loadingElement = document.getElementById('invite-loading');
    const formElement = document.getElementById('password-form');
    const passwordInput = document.getElementById('new-password');
    const confirmPasswordInput = document.getElementById('confirm-password');
    const submitButton = document.getElementById('create-password-button');
    const errorElement = document.getElementById('password-error');
    const successElement = document.getElementById('password-success');

    function showError(message) {
      successElement.classList.add('hidden');
      errorElement.textContent = message || 'Não foi possível concluir a operação.';
      errorElement.classList.remove('hidden');
    }

    function clearMessages() {
      errorElement.textContent = '';
      successElement.textContent = '';
      errorElement.classList.add('hidden');
      successElement.classList.add('hidden');
    }

    function setLoading(show) {
      loadingElement.classList.toggle('hidden', !show);
    }

    function setSubmitting(show) {
      submitButton.disabled = show;
      submitButton.innerHTML = show
        ? '<span class="spinner" aria-hidden="true"></span><span>Criando senha...</span>'
        : 'Criar senha';
    }

    function getErrorMessage(code, fallback) {
      const messages = {
        invalid_invite: 'Este convite é inválido, foi substituído ou já foi utilizado.',
        invite_expired: 'Este convite expirou. Solicite um novo convite ao administrador.',
        user_not_found: 'O usuário associado ao convite não foi encontrado.',
        server_error: 'O servidor não conseguiu processar a solicitação.'
      };

      return fallback || messages[code] || 'Não foi possível processar este convite.';
    }

    async function callApi(action, payload) {
      let response;

      try {
        response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: action, ...payload })
        });
      } catch (error) {
        throw new Error('Não foi possível conectar ao servidor. Verifique sua internet.');
      }

      try {
        return await response.json();
      } catch (error) {
        throw new Error('O servidor retornou uma resposta inválida.');
      }
    }

    async function validateInvite() {
      clearMessages();
      formElement.classList.add('hidden');
      setLoading(true);

      if (!inviteToken) {
        setLoading(false);
        statusElement.textContent = 'O link de convite está incompleto.';
        showError('Solicite um novo convite ao administrador.');
        return;
      }

      try {
        const data = await callApi('validateInvite', { token: inviteToken });

        if (!data || data.ok !== true) {
          statusElement.textContent = getErrorMessage(data && data.error, data && data.message);
          return;
        }

        statusElement.textContent = 'Olá, ' + data.name + '. Crie uma senha para acessar o Playbook.';
        formElement.classList.remove('hidden');
        passwordInput.focus();
      } catch (error) {
        statusElement.textContent = 'Não foi possível validar o convite.';
        showError(error.message);
      } finally {
        setLoading(false);
      }
    }

    formElement.addEventListener('submit', async function (event) {
      event.preventDefault();
      clearMessages();

      const passwordValue = passwordInput.value;
      const confirmationValue = confirmPasswordInput.value;

      if (!passwordValue || !confirmationValue) {
        showError('Preencha os dois campos de senha.');
        return;
      }

      if (passwordValue !== confirmationValue) {
        showError('As senhas não coincidem.');
        confirmPasswordInput.focus();
        return;
      }

      if (
        passwordValue.length < 10 ||
        !/[A-Za-z]/.test(passwordValue) ||
        !/[0-9]/.test(passwordValue)
      ) {
        showError('A senha deve ter pelo menos 10 caracteres, incluindo letras e números.');
        return;
      }

      setSubmitting(true);

      try {
        const data = await callApi('setPassword', {
          token: inviteToken,
          password: passwordValue
        });

        if (!data || data.ok !== true) {
          const message = getErrorMessage(data && data.error, data && data.message);
          showError(message);

          if (data && (data.error === 'invite_expired' || data.error === 'invalid_invite')) {
            statusElement.textContent = message;
            formElement.classList.add('hidden');
          }
          return;
        }

        formElement.classList.add('hidden');
        statusElement.textContent = 'Senha criada com sucesso.';
        successElement.textContent = 'Redirecionando para o login...';
        successElement.classList.remove('hidden');

        window.setTimeout(function () {
          window.location.href = './index.html';
        }, 1500);
      } catch (error) {
        showError(error.message);
      } finally {
        setSubmitting(false);
      }
    });

    validateInvite();
  </script>
</body>
</html>
