const API_URL =
  'https://script.google.com/macros/s/AKfycbx1qJyA5y_23PzyQB92p_3PwutD9qozQedu6Dh0sbItvnA2_0yrRWoGmtfIrBwZEN6mkQ/exec';

const inviteToken =
  new URLSearchParams(window.location.search).get('token') || '';

const statusElement = document.getElementById('status');
const formElement = document.getElementById('form');
const errorElement = document.getElementById('error');

const passwordInput = document.getElementById('password');
const confirmPasswordInput = document.getElementById('confirm');

const submitButton = formElement.querySelector('button[type="submit"]');

function showError(message) {
  errorElement.textContent = message;
  errorElement.classList.remove('hidden');
}

function clearError() {
  errorElement.textContent = '';
  errorElement.classList.add('hidden');
}

function setSubmitting(isSubmitting) {
  submitButton.disabled = isSubmitting;

  submitButton.innerHTML = isSubmitting
    ? '<span class="v13-spinner"></span> Criando senha...'
    : 'Criar senha';
}

function inviteErrorMessage(errorCode) {
  const messages = {
    invalid_invite:
      'Este convite é inválido ou já foi utilizado.',

    invite_expired:
      'Este convite expirou. Solicite um novo convite ao administrador.',

    user_not_found:
      'O usuário associado a este convite não foi encontrado.',

    server_error:
      'O servidor não conseguiu processar a solicitação.',

    invalid_json:
      'O servidor recebeu uma solicitação inválida.'
  };

  return messages[errorCode] ||
    'Não foi possível validar este convite.';
}

async function callApi(action, payload) {
  let response;

  try {
    response = await fetch(API_URL, {
      method: 'POST',

      headers: {
        'Content-Type': 'text/plain;charset=utf-8'
      },

      body: JSON.stringify({
        action,
        ...payload
      })
    });
  } catch (networkError) {
    throw new Error(
      'Não foi possível conectar ao servidor. Verifique sua internet e tente novamente.'
    );
  }

  let data;

  try {
    data = await response.json();
  } catch (parseError) {
    throw new Error(
      'O servidor retornou uma resposta inválida.'
    );
  }

  return data;
}

async function validateInvite() {
  clearError();

  if (!inviteToken) {
    statusElement.textContent =
      'O link não contém um código de convite válido.';

    showError(
      'Solicite um novo convite ao administrador.'
    );

    return;
  }

  statusElement.textContent = 'Validando convite...';
  formElement.classList.add('hidden');

  try {
    const data = await callApi('validateInvite', {
      token: inviteToken
    });

    if (!data || data.ok !== true) {
      statusElement.textContent =
        inviteErrorMessage(data?.error);

      showError(
        data?.message ||
        inviteErrorMessage(data?.error)
      );

      return;
    }

    statusElement.textContent =
      `Olá, ${data.name}. Crie uma senha com pelo menos ` +
      '10 caracteres, contendo letras e números.';

    formElement.classList.remove('hidden');
    passwordInput.focus();

  } catch (error) {
    statusElement.textContent =
      'Não foi possível validar o convite.';

    showError(error.message);
  }
}

formElement.addEventListener('submit', async function (event) {
  event.preventDefault();
  clearError();

  const password = passwordInput.value;
  const confirmedPassword = confirmPasswordInput.value;

  if (!password || !confirmedPassword) {
    showError('Preencha os dois campos de senha.');
    return;
  }

  if (password !== confirmedPassword) {
    showError('As senhas não coincidem.');
    confirmPasswordInput.focus();
    return;
  }

  if (password.length < 10) {
    showError(
      'A senha deve ter pelo menos 10 caracteres.'
    );

    passwordInput.focus();
    return;
  }

  if (!/[A-Za-z]/.test(password)) {
    showError('A senha deve conter pelo menos uma letra.');
    passwordInput.focus();
    return;
  }

  if (!/[0-9]/.test(password)) {
    showError('A senha deve conter pelo menos um número.');
    passwordInput.focus();
    return;
  }

  setSubmitting(true);

  try {
    const data = await callApi('setPassword', {
      token: inviteToken,
      password
    });

    if (!data || data.ok !== true) {
      showError(
        data?.message ||
        inviteErrorMessage(data?.error)
      );

      if (
        data?.error === 'invite_expired' ||
        data?.error === 'invalid_invite'
      ) {
        statusElement.textContent =
          inviteErrorMessage(data.error);

        formElement.classList.add('hidden');
      }

      return;
    }

    statusElement.textContent =
      'Senha criada com sucesso. Redirecionando para o login...';

    formElement.classList.add('hidden');

    window.setTimeout(function () {
      window.location.href = './index.html';
    }, 1500);

  } catch (error) {
    showError(error.message);

  } finally {
    setSubmitting(false);
  }
});

validateInvite();
</script></body></html>
