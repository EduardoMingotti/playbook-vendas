<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="color-scheme" content="dark"><title>Definir senha</title><link rel="stylesheet" href="./styles/main.v11.css"></head><body class="app-locked"><main class="access-screen"><section class="access-card"><div class="access-logo">$</div><h1>Definir senha</h1><p id="status">Validando convite...</p><form id="form" class="hidden"><label>Nova senha<input id="password" type="password" minlength="10" required></label><label>Confirmar senha<input id="confirm" type="password" minlength="10" required></label><button class="primary" type="submit">Criar senha</button><div id="error" class="error hidden"></div></form></section></main><script>const API_URL='https://script.google.com/macros/s/AKfycbx1qJyA5y_23PzyQB92p_3PwutD9qozQedu6Dh0sbItvnA2_0yrRWoGmtfIrBwZEN6mkQ/exec',token=new URLSearchParams(location.search).get('token');async function api(action,p){return(await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,...p})})).json()}(async()=>{const d=await api('validateInvite',{token});if(d.ok){status.textContent='Olá, '+d.name+'. Crie sua senha.';form.classList.remove('hidden')}else status.textContent=d.error==='invite_expired'?'Convite expirado.':'Convite inválido.'})();form.onsubmit=async e=>{e.preventDefault();if(password.value!==confirm.value){error.textContent='As senhas não coincidem.';error.classList.remove('hidden');return}const d=await api('setPassword',{token,password:password.value});if(d.ok){status.textContent='Senha criada. Redirecionando...';form.classList.add('hidden');setTimeout(()=>location='./index.html',1200)}else{error.textContent=d.message||d.error;error.classList.remove('hidden')}}</script></body></html>
